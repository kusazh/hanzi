<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>合成大漢字</title>
  <style>
    body {
      background-color: white;
      font-family: serif;
      margin: 0 auto;
      max-width: 100%;
      touch-action: none;
      width: 400px;
    }

    body * {
      color: black;
      line-height: 1;
      text-align: center;
      outline-offset: -10px;
    }

    h1 {
      left: 10px;
      right: 0;

      font-size: initial;
      letter-spacing: 10px;
      margin: 0 auto;
      position: fixed;
      width: fit-content;
    }

    header {
      display: flex;
      margin: 20px 10px 5px 10px;
      justify-content: space-between;
    }

    a {
      margin-top: -2.5px;
      text-underline-offset: 5px;
    }

    img {
      opacity: 0.2;
      width: 25.6px;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: black;
      }

      body * {
        color: white;
      }

      button {
        color: initial;
      }

      img {
        filter: invert(100%);
      }
    }
  </style>
</head>

<body>
  <h1>合成大漢字</h1>
  <header>
    <button id="btnReset">重開</button>
    <a href="https://github.com/kusazh/hanzi"><small>源</small></a>
  </header>
  <canvas id="game"></canvas>
  <footer>
    <a href="../me"><img src="../images/logo.svg" alt="Logo" /></a>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@latest/build/matter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/opentype.js@latest/dist/opentype.min.js"></script>
  <script>
    // TODO: 游戏结束，计算最大汉字
    const { Body, Bodies, Composite, Engine, Events, Render, Runner, Svg, World } = Matter;

    const thickness = 20;
    const w = Math.min(window.innerWidth, 400);
    const h = w * 1.6;
    const indicator = w * 0.3;
    const delta = w * 0.02;
    // const radicals = ["一", "丨", "丿", "乀", "丶"];
    const radicals = [];
    let font, preview;
    let bColor = "white";
    let fColor = "black";
    let zis = [];
    let ziDict = {};
    let partDict = {};
    let svgs = {};

    if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
      bColor = "black";
      fColor = "white";
    }

    const canvas = document.getElementById("game");
    const rect = canvas.getBoundingClientRect();
    canvas.width = w;
    canvas.height = h;
    canvas.style.outline = "1px solid grey";

    let engine = Engine.create();
    let world = engine.world;
    world.gravity.y = 1;

    let render = Render.create({
      canvas: canvas,
      engine: engine,
      options: {
        width: w,
        height: h,
        wireframes: false,  // true
        background: bColor,
      }
    });
    Render.run(render);
    Runner.run(Runner.create(), engine);

    const ground = Bodies.rectangle(w / 2, h, w, thickness, { isStatic: true, render: { visible: false } });
    const wallL = Bodies.rectangle(0, h / 2, thickness, h, { isStatic: true, render: { visible: false } });
    const wallR = Bodies.rectangle(w, h / 2, thickness, h, { isStatic: true, render: { visible: false } });
    World.add(world, [ground, wallL, wallR]);

    fetch("./dictionary.json")
      .then(response => response.json())
      .then(json => {
        ziDict = json;
        for (const [key, [_, parts]] of Object.entries(ziDict)) {
          parts.forEach(part => {
            partDict[part] = key;
            for (const r of part) {
              if (!(r in ziDict) || ziDict[r][0] < 5) radicals.push(r);
            };
          });
        }
      })
      .catch(err => console.error(err));

    // TODO: loading
    opentype.load("./SourceHanSerifTC-Heavy.otf", function (err, f) {
      if (err) return console.error(err);
      font = f;
      // showcase
      // zis = [
      //   genBody("合", w / 2, null),
      //   genBody("成", w / 2, null),
      //   genBody("大", w / 2, null),
      //   genBody("漢", w / 2, null),
      //   genBody("字", w / 2, null),
      // ];
      // World.add(world, zis);
    });

    function genSvg(text) {
      const stroke = (text in ziDict) ? ziDict[text][0] : 1;
      const path = font.getPath(text, 0, 0, indicator / 2 + delta * stroke);
      let minX = 0, minY = 0, maxX = 0, maxY = 0;

      path.commands.forEach(cmd => {
        if ("x" in cmd && "y" in cmd) {
          const x = Math.round(cmd.x * 100) / 100;
          const y = Math.round(cmd.y * 100) / 100;
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      });
      const bodyW = maxX - minX;
      const bodyH = maxY - minY;
      const svgString = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="${minX} ${minY} ${bodyW} ${bodyH}">
          <path d="${path.toPathData(2)}" fill="${fColor}"/>
        </svg>
      `;
      const mediaType = "image/svg+xml";
      const doc = new DOMParser().parseFromString(svgString, mediaType);
      const vertices = Svg.pathToVertices(doc.querySelector("path"), 2);
      const svgBlob = new Blob([svgString], { type: mediaType });
      const svgUrl = URL.createObjectURL(svgBlob);
      return [bodyW, bodyH, vertices, svgUrl];
    }

    function genBody(text, x, y = null, isPreview = false) {
      let vertices, svgUrl;
      if (text in svgs) {
        [bodyW, bodyH, vertices, svgUrl] = svgs[text];
      } else {
        svgs[text] = [bodyW, bodyH, vertices, svgUrl] = genSvg(text);
      }
      x = checkX(x, bodyW);
      y = y ?? bodyH / 2 + thickness / 2;
      let body = Bodies.fromVertices(x, y, vertices, {
        isStatic: isPreview,
        isSensor: isPreview,
        restitution: 0.2,
        friction: 0.1,
        render: { sprite: { texture: svgUrl } }
      }, true);
      body[isPreview ? "previewText" : "text"] = text;
      return body
    }

    function checkX(x, bodyW) {
      x = Math.min(x, w - bodyW / 2 - thickness / 2);
      x = Math.max(x, bodyW / 2 + thickness / 2);
      return x;
    }

    function mergeZi(a, b) {
      console.log()
      const newZi = partDict[a.text + b.text] || partDict[b.text + a.text];
      if (!newZi) return;
      const x = (a.position.x + b.position.x) / 2;
      const y = (a.position.y + b.position.y) / 2;
      let body = genBody(newZi, x, y);
      World.remove(world, [a, b]);
      zis = zis.filter(f => f !== a && f !== b);
      zis.push(body);
      World.add(world, body);
    }

    canvas.addEventListener("pointerdown", e => {
      if (!font || !ziDict) return;
      const x = (e.clientX - rect.left) * (w / rect.width);
      canvas.setPointerCapture(e.pointerId);
      const keys = Object.keys(radicals);
      const index = Math.floor(Math.random() * keys.length);
      preview = genBody(radicals[index], x, null, true);
      World.add(world, preview);
    });

    canvas.addEventListener("pointermove", e => {
      if (!preview) return;
      const bodyW = svgs[preview.previewText][0];
      const x = checkX((e.clientX - canvas.offsetLeft) * (w / rect.width), bodyW);
      Body.setPosition(preview, { x: x, y: preview.position.y });
    });

    canvas.addEventListener("pointerup", e => {
      if (!preview) return;
      const x = (e.clientX - canvas.offsetLeft) * (w / rect.width);
      let body = genBody(preview.previewText, x, null);
      World.remove(world, preview);
      preview = null;
      zis.push(body);
      World.add(world, body);
    });

    Events.on(engine, "collisionStart", e => {
      let pairs = e.pairs;
      for (let pair of pairs) {
        let a = pair.bodyA, b = pair.bodyB;
        if (a.text && b.text && a.position.y > indicator && b.position.y > indicator) {
          mergeZi(a, b);
        }
      }
    });

    document.getElementById("btnReset").onclick = () => {
      zis.forEach(b => World.remove(world, b));
      Object.values(svgs).forEach(data => URL.revokeObjectURL(data[3]));
      zis = [];
      svgs = {};
    };
  </script>
  <script async defer src="https://buttons.github.io/buttons.js"></script>
</body>

</html>
