<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>合成大漢字</title>
  <style>
    body {
      font-family: serif;
      margin: 0 auto;
      max-width: 100%;
      width: 400px;
    }

    body * {
      color: inherit;
      line-height: 1;
    }

    h1 {
      left: 10px;
      right: 0;

      font-size: initial;
      letter-spacing: 10px;
      margin: 0 auto;
      position: fixed;
      width: fit-content;
    }

    div {
      display: flex;
      margin: 20px 10px 0px 10px;
      justify-content: space-between;
    }

    canvas {
      outline-offset: -10px;
    }

    footer {
      text-align: center;
    }

    a {
      color: inherit;
      text-underline-offset: 5px;
    }
  </style>
</head>

<body>
  <h1>合成大漢字</h1>
  <div>
    <button id="btnReset">重開</button>
    <a class="github-button" href="https://github.com/kusazh/hanzi"
      data-color-scheme="no-preference: light; light: light; dark: dark;" data-icon="octicon-star"
      aria-label="Star kusazh/hanzi on GitHub">
      星
    </a>
  </div>
  <canvas id="game"></canvas>
  <footer>
    <a href="../me">張苦洒</a>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@latest/build/matter.min.js"></script>
  <script src="https://unpkg.com/opentype.js@latest/dist/opentype.min.js"></script>
  <script>
    // TODO: 字典，字号，游戏结束，计算最大汉字
    const { Body, Bodies, Composite, Engine, Events, Render, Runner, Svg, World } = Matter;

    const thickness = 20;
    const w = Math.min(window.innerWidth, 400);
    const h = w * 1.6;
    const fontSize = w * 0.3;
    const svgs = {};
    let font, preview;
    let hanzis = [];
    let isDragging = false;

    const canvas = document.getElementById("game");
    const rect = canvas.getBoundingClientRect();
    canvas.width = w;
    canvas.height = h;
    canvas.style.outline = "1px solid rgba(0, 0, 0, 0.2)";

    let engine = Engine.create();
    let world = engine.world;
    world.gravity.y = 1;

    let render = Render.create({
      canvas: canvas,
      engine: engine,
      options: {
        width: w,
        height: h,
        wireframes: false,  // true
        background: "white",
      }
    });
    Render.run(render);
    Runner.run(Runner.create(), engine);

    const ground = Bodies.rectangle(w / 2, h, w, thickness, { isStatic: true, render: { visible: false } });
    const wallL = Bodies.rectangle(0, h / 2, thickness, h, { isStatic: true, render: { visible: false } });
    const wallR = Bodies.rectangle(w, h / 2, thickness, h, { isStatic: true, render: { visible: false } });
    World.add(world, [ground, wallL, wallR]);

    opentype.load("./SourceHanSerifTC-Heavy.otf", function (err, f) {
      if (err) return console.error(err);
      font = f;
    });

    function genSvg(text) {
      const path = font.getPath(text, 0, 0, fontSize);
      let minX = 0, minY = 0, maxX = 0, maxY = 0;

      path.commands.forEach(cmd => {
        if ("x" in cmd && "y" in cmd) {
          const x = Math.round(cmd.x * 100) / 100;
          const y = Math.round(cmd.y * 100) / 100;
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      });
      const svgString = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="${minX} ${minY} ${maxX - minX} ${maxY - minY}">
          <path d="${path.toPathData(2)}" fill="black"/>
        </svg>
      `;
      const mediaType = "image/svg+xml";
      const doc = new DOMParser().parseFromString(svgString, mediaType);
      const vertices = Svg.pathToVertices(doc.querySelector("path"), 15);
      const svgBlob = new Blob([svgString], { type: mediaType });
      const svgUrl = URL.createObjectURL(svgBlob);
      return [vertices, svgUrl];
    }

    function genBody(text, x, y = null, isPreview = false) {
      let vertices, svgUrl;
      if (text in svgs) {
        [vertices, svgUrl] = svgs[text];
      } else {
        [vertices, svgUrl] = genSvg(text);
        svgs[text] = [vertices, svgUrl];
      }
      y = y ?? fontSize / 2 + thickness / 2;
      x = Math.min(x, w - fontSize / 2 - thickness / 2);
      x = Math.max(x, fontSize / 2 + thickness / 2);
      let body = Bodies.fromVertices(x, y, vertices, {
        isStatic: isPreview,
        isSensor: isPreview,
        restitution: 0.2,
        friction: 0.1,
        render: { sprite: { texture: svgUrl } }
      }, true);
      if (isPreview) {
        body.previewText = text;
      } else {
        body.text = text;
      }
      return body
    }

    function mergeHanzi(a, b) {
      const x = (a.position.x + b.position.x) / 2;
      const y = (a.position.y + b.position.y) / 2;
      let body = genBody("你", x, y);
      World.remove(world, [a, b]);
      hanzis = hanzis.filter(f => f !== a && f !== b);
      hanzis.push(body);
      World.add(world, body);
    }

    canvas.addEventListener("pointerdown", e => {
      isDragging = true;

      const x = (e.clientX - rect.left) * (w / rect.width);
      canvas.setPointerCapture(e.pointerId);
      preview = genBody("我", x, null, true);
    });

    canvas.addEventListener("pointermove", e => {
      if (!isDragging) return;

      const x = (e.clientX - rect.left) * (w / rect.width);
      World.remove(world, preview);
      preview = genBody(preview.previewText, x, null, true);
      World.add(world, preview);
    });

    canvas.addEventListener("pointerup", e => {
      isDragging = false;

      const x = (e.clientX - rect.left) * (w / rect.width);
      let body = genBody(preview.previewText, x, null);
      World.remove(world, preview);
      hanzis.push(body);
      World.add(world, body);
    });

    Events.on(engine, "collisionStart", e => {
      let pairs = e.pairs;
      for (let pair of pairs) {
        let a = pair.bodyA, b = pair.bodyB;
        if (a.text && b.text) {
          mergeHanzi(a, b);
        }
      }
    });

    document.getElementById("btnReset").onclick = () => {
      hanzis.forEach(f => World.remove(world, f));
      hanzis = [];
    };
  </script>
  <script async defer src="https://buttons.github.io/buttons.js"></script>
</body>

</html>
